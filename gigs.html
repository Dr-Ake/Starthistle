<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Starthistle | Gig Dates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "electric-gold": "#FFD700",
                "acid-green": "#2ECC71",
                "primary": "#dcb8ff", 
                "primary-container": "#2e0e4d", 
                "background": "#131313", 
                "surface": "#1f1f1f",
                "surface-variant": "#353535",
                "on-surface": "#e2e2e2",
                "on-surface-variant": "#cdc3d0",
                "deep-obsidian": "#0A0A0A",
              },
              fontFamily: {
                "headline": ["Oswald", "sans-serif"],
                "body": ["Verdana", "Helvetica", "sans-serif"],
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="styles.css"/>
    <style>
        body { font-family: 'Verdana', 'Helvetica', sans-serif; }
        h1, h2, h3, h4, h5, h6, .nav-link { font-family: 'Oswald', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #mobile-menu { display: none; }
        #mobile-menu.active { display: flex; }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">
    <!-- TopNavBar Component -->
    <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 md:px-8 py-4 bg-background border-b-2 border-primary">
        <div class="flex items-center gap-8">
            <a href="index.html" class="font-headline text-2xl md:text-3xl font-bold text-electric-gold tracking-tight uppercase">StarThistle</a>
            <div class="hidden md:flex items-center gap-6">
                <a href="index.html" class="font-headline text-xl text-on-surface hover:text-electric-gold hover:bg-surface-variant transition-colors duration-100 px-2 py-1 uppercase">Home</a>
                <a href="about.html" class="font-headline text-xl text-on-surface hover:text-electric-gold hover:bg-surface-variant transition-colors duration-100 px-2 py-1 uppercase">About</a>
                <a href="merch.html" class="font-headline text-xl text-on-surface hover:text-electric-gold hover:bg-surface-variant transition-colors duration-100 px-2 py-1 uppercase">Merch</a>
                <a href="gigs.html" class="font-headline text-xl text-electric-gold border-b-2 border-electric-gold pb-1 px-2 uppercase">Gig Dates</a>
                <a href="contact.html" class="font-headline text-xl text-on-surface hover:text-electric-gold hover:bg-surface-variant transition-colors duration-100 px-2 py-1 uppercase">Contact</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <img src="images/logo.png" alt="StarThistle Logo" class="hidden md:block h-16 w-16 object-contain" />
            <div class="hidden md:flex gap-4">
                <a href="https://www.facebook.com/starthistlenorcal" target="_blank" class="text-electric-gold hover:bg-surface-variant p-2 transition-colors duration-100">
                    <span class="material-symbols-outlined">thumb_up</span>
                </a>
                <a href="https://www.instagram.com/starthistle_norcal/" target="_blank" class="text-electric-gold hover:bg-surface-variant p-2 transition-colors duration-100">
                    <span class="material-symbols-outlined">photo_camera</span>
                </a>
            </div>
            <button class="md:hidden text-electric-gold p-2" onclick="document.getElementById('mobile-menu').classList.toggle('active')">
                <span class="material-symbols-outlined text-3xl">menu</span>
            </button>
        </div>
    </nav>

    <div id="mobile-menu" class="fixed top-[74px] left-0 w-full bg-surface-variant flex-col items-center py-4 z-40 border-b-2 border-primary shadow-xl">
        <a href="index.html" class="font-headline text-xl text-on-surface py-3 uppercase w-full text-center border-b border-surface">Home</a>
        <a href="about.html" class="font-headline text-xl text-on-surface py-3 uppercase w-full text-center border-b border-surface">About</a>
        <a href="merch.html" class="font-headline text-xl text-on-surface py-3 uppercase w-full text-center border-b border-surface">Merch</a>
        <a href="gigs.html" class="font-headline text-xl text-electric-gold py-3 uppercase w-full text-center border-b border-surface">Gig Dates</a>
        <a href="contact.html" class="font-headline text-xl text-on-surface py-3 uppercase w-full text-center border-b border-surface">Contact</a>
    </div>

    <!-- Main Canvas -->
    <main class="flex-grow pt-32 pb-24 w-full max-w-[1200px] mx-auto px-4 md:px-8 animate-fade-in-up">
        <h1 class="font-headline text-5xl md:text-7xl text-electric-gold uppercase mb-12 tracking-tight border-b-4 border-primary pb-4 inline-block hover-jitter">Tour Dates</h1>
        
        <div class="bg-surface border-2 border-surface-variant p-8 md:p-12 shadow-[8px_8px_0_0_#2ECC71] animate-fade-in-up delay-100 relative">
            <p class="font-body text-xl text-on-surface mb-8 italic text-center text-on-surface-variant animate-brutal-pulse">
                "We don't just play shows. We launch sonic assaults."
            </p>

            <!-- Gigs List -->
            <div id="gigs-list" class="space-y-6 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                <!-- Gigs will be injected here by Javascript -->
            </div>

            <!-- Scroll Indicator Arrow -->
            <div id="scroll-arrow" class="hidden absolute bottom-2 right-4 text-acid-green animate-bounce pointer-events-none">
                <span class="material-symbols-outlined text-4xl">keyboard_double_arrow_down</span>
            </div>
        </div>
    </main>

    <!-- Footer Component -->
    <footer class="w-full py-12 px-4 md:px-8 flex flex-col md:flex-row justify-between items-center gap-8 bg-deep-obsidian border-t-4 border-primary-container mt-auto">
        <div class="flex flex-col gap-2 items-center md:items-start">
            <span class="font-headline text-3xl text-primary uppercase">StarThistle</span>
            <p class="font-body text-sm text-on-surface-variant">© 2025 StarThistle. Redding, CA.</p>
        </div>
        <div class="flex flex-wrap gap-6 items-center justify-center">
            <a href="https://www.facebook.com/starthistlenorcal" class="font-headline text-lg text-on-surface-variant hover:text-acid-green transition-colors uppercase">Facebook</a>
            <a href="https://www.instagram.com/starthistle_norcal/" class="font-headline text-lg text-on-surface-variant hover:text-acid-green transition-colors uppercase">Instagram</a>
            <a href="contact.html" class="font-headline text-lg text-electric-gold hover:text-acid-green transition-colors uppercase">Contact</a>
        </div>
    </footer>

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gigsList = document.getElementById('gigs-list');
            if (siteData && siteData.gigs && gigsList) {
                if (siteData.gigs.length === 0) {
                    gigsList.innerHTML = '<p class="text-on-surface-variant text-center py-8">No upcoming dates announced yet. Check back soon.</p>';
                    return;
                }
                
                siteData.gigs.forEach(gig => {
                    const gigHtml = `
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center bg-background border border-surface-variant p-6 hover:border-electric-gold transition-colors">
                        <div class="md:col-span-3 flex flex-col">
                            <span class="font-headline text-3xl text-primary">${gig.date}</span>
                            <span class="font-body text-sm text-on-surface-variant uppercase">${gig.time}</span>
                        </div>
                        <div class="md:col-span-3 flex flex-col">
                            <span class="font-headline text-2xl text-on-surface uppercase">${gig.venue}</span>
                            <span class="font-body text-lg text-on-surface-variant">${gig.location}</span>
                        </div>
                        <div class="md:col-span-3 flex items-center justify-center">
                            ${(gig.memo && gig.memo.trim() !== "") ? 
                                `<span class="font-body text-base text-acid-green italic text-center">${gig.memo}</span>` 
                                : ''
                            }
                        </div>
                        <div class="md:col-span-3 flex justify-end">
                            ${(!gig.ticketLink || gig.ticketLink === "") ? 
                                `<span class="w-full md:w-auto text-center bg-transparent text-on-surface-variant font-headline text-lg uppercase px-8 py-2 border-2 border-surface-variant">${gig.ticketText || 'Free Entry'}</span>` 
                                : 
                                `<a href="${gig.ticketLink}" target="_blank" class="w-full md:w-auto text-center bg-transparent text-electric-gold font-headline text-lg uppercase px-8 py-2 border-2 border-electric-gold hover:bg-electric-gold hover:text-background transition-none">${gig.ticketText || 'Tickets'}</a>`
                            }
                        </div>
                    </div>
                    `;
                    gigsList.insertAdjacentHTML('beforeend', gigHtml);
                });

                const scrollArrow = document.getElementById('scroll-arrow');
                
                const checkScroll = () => {
                    if (gigsList.scrollHeight > gigsList.clientHeight) {
                        if (Math.ceil(gigsList.scrollTop + gigsList.clientHeight) >= gigsList.scrollHeight - 5) {
                            scrollArrow.classList.add('hidden');
                        } else {
                            scrollArrow.classList.remove('hidden');
                        }
                    } else {
                        scrollArrow.classList.add('hidden');
                    }
                };

                setTimeout(checkScroll, 100);
                
                gigsList.addEventListener('scroll', checkScroll);
                window.addEventListener('resize', checkScroll);
            }
        });
    </script>
</body>
</html>
