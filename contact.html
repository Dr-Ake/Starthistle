<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StarThistle | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "electric-gold": "#FFD700",
                "acid-green": "#2ECC71",
                "primary": "#dcb8ff", 
                "primary-container": "#2e0e4d", 
                "background": "#131313", 
                "surface": "#1f1f1f",
                "surface-variant": "#353535",
                "on-surface": "#e2e2e2",
                "on-surface-variant": "#cdc3d0",
                "deep-obsidian": "#0A0A0A",
              },
              fontFamily: {
                "headline": ["Oswald", "sans-serif"],
                "body": ["Verdana", "Helvetica", "sans-serif"],
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="styles.css"/>
    <style>
        body { font-family: 'Verdana', 'Helvetica', sans-serif; }
        h1, h2, h3, h4, h5, h6, .nav-link { font-family: 'Oswald', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        #mobile-menu { display: none; }
        #mobile-menu.active { display: flex; }
        input:focus, textarea:focus { outline: none; box-shadow: none; }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">
    <!-- TopNavBar Component -->
    <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 md:px-8 py-4 bg-background border-b-2 border-primary">
        <div class="flex items-center gap-8">
            <a href="index.html" class="font-headline text-2xl md:text-3xl font-bold text-electric-gold tracking-tight uppercase">StarThistle</a>
            <div class="hidden md:flex items-center gap-6">
                <a href="index.html" class="font-headline text-xl text-on-surface hover:text-electric-gold hover:bg-surface-variant transition-colors duration-100 px-2 py-1 uppercase">Home</a>
                <a href="about.html" class="font-headline text-xl text-on-surface hover:text-electric-gold hover:bg-surface-variant transition-colors duration-100 px-2 py-1 uppercase">About</a>
                <a href="merch.html" class="font-headline text-xl text-on-surface hover:text-electric-gold hover:bg-surface-variant transition-colors duration-100 px-2 py-1 uppercase">Merch</a>
                <a href="gigs.html" class="font-headline text-xl text-on-surface hover:text-electric-gold hover:bg-surface-variant transition-colors duration-100 px-2 py-1 uppercase">Gig Dates</a>
                <a href="contact.html" class="font-headline text-xl text-electric-gold border-b-2 border-electric-gold pb-1 px-2 uppercase">Contact</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <img src="images/logo.png" alt="StarThistle Logo" class="hidden md:block h-16 w-16 object-contain" />
            <div class="hidden md:flex gap-4">
                <a href="https://www.facebook.com/starthistlenorcal" target="_blank" class="text-electric-gold hover:bg-surface-variant p-2 transition-colors duration-100">
                    <span class="material-symbols-outlined">thumb_up</span>
                </a>
                <a href="https://www.instagram.com/starthistle_norcal/" target="_blank" class="text-electric-gold hover:bg-surface-variant p-2 transition-colors duration-100">
                    <span class="material-symbols-outlined">photo_camera</span>
                </a>
            </div>
            <button class="md:hidden text-electric-gold p-2" onclick="document.getElementById('mobile-menu').classList.toggle('active')">
                <span class="material-symbols-outlined text-3xl">menu</span>
            </button>
        </div>
    </nav>

    <div id="mobile-menu" class="fixed top-[74px] left-0 w-full bg-surface-variant flex-col items-center py-4 z-40 border-b-2 border-primary shadow-xl">
        <a href="index.html" class="font-headline text-xl text-on-surface py-3 uppercase w-full text-center border-b border-surface">Home</a>
        <a href="about.html" class="font-headline text-xl text-on-surface py-3 uppercase w-full text-center border-b border-surface">About</a>
        <a href="merch.html" class="font-headline text-xl text-on-surface py-3 uppercase w-full text-center border-b border-surface">Merch</a>
        <a href="gigs.html" class="font-headline text-xl text-on-surface py-3 uppercase w-full text-center border-b border-surface">Gig Dates</a>
        <a href="contact.html" class="font-headline text-xl text-electric-gold py-3 uppercase w-full text-center border-b border-surface">Contact</a>
    </div>

    <!-- Main Canvas -->
    <main class="flex-grow pt-32 pb-24 w-full max-w-[1600px] mx-auto px-4 md:px-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <!-- Contact Form -->
            <div class="lg:col-span-7 bg-surface p-8 md:p-12 border-2 border-primary shadow-[8px_8px_0_0_#dcb8ff] animate-fade-in-up">
                <h1 class="font-headline text-4xl md:text-5xl text-electric-gold uppercase mb-8 border-b-2 border-surface-variant pb-4 tracking-tight hover-jitter inline-block">Inquiries & Booking</h1>
                
                <form class="space-y-8 mt-8" onsubmit="event.preventDefault(); alert('Not hooked up yet!');">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="flex flex-col">
                            <label class="font-headline text-lg text-primary uppercase mb-2" for="first_name">First Name</label>
                            <input class="bg-transparent border-0 border-b-2 border-surface-variant focus:border-electric-gold focus:ring-0 text-on-surface font-body py-2 px-0 transition-colors rounded-none" id="first_name" name="first_name" required type="text"/>
                        </div>
                        <div class="flex flex-col">
                            <label class="font-headline text-lg text-primary uppercase mb-2" for="last_name">Last Name</label>
                            <input class="bg-transparent border-0 border-b-2 border-surface-variant focus:border-electric-gold focus:ring-0 text-on-surface font-body py-2 px-0 transition-colors rounded-none" id="last_name" name="last_name" required type="text"/>
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <label class="font-headline text-lg text-primary uppercase mb-2" for="phone">Phone Number</label>
                        <input class="bg-transparent border-0 border-b-2 border-surface-variant focus:border-electric-gold focus:ring-0 text-on-surface font-body py-2 px-0 transition-colors rounded-none" id="phone" name="phone" type="tel"/>
                    </div>
                    <div class="flex flex-col">
                        <label class="font-headline text-lg text-primary uppercase mb-2" for="email">Email Address</label>
                        <input class="bg-transparent border-0 border-b-2 border-surface-variant focus:border-electric-gold focus:ring-0 text-on-surface font-body py-2 px-0 transition-colors rounded-none" id="email" name="email" required type="email"/>
                    </div>
                    <div class="flex flex-col">
                        <label class="font-headline text-lg text-primary uppercase mb-2" for="message">Message</label>
                        <textarea class="bg-transparent border-0 border-b-2 border-surface-variant focus:border-electric-gold focus:ring-0 text-on-surface font-body py-2 px-0 transition-colors rounded-none min-h-[100px]" id="message" name="message" required></textarea>
                    </div>
                    <div class="pt-6">
                        <button class="w-full bg-electric-gold text-background font-headline text-xl uppercase px-12 py-4 border-2 border-electric-gold hover:bg-background hover:text-electric-gold transition-none" type="submit">
                            Transmit Signal
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Social Links & Info -->
            <div class="lg:col-span-5 flex flex-col gap-6 justify-center mt-12 lg:mt-0 animate-fade-in-up delay-100">
                <div class="mb-4">
                    <span class="inline-block bg-primary-container text-on-surface font-headline text-xl uppercase px-4 py-2 border border-surface-variant tracking-widest">Comm Link</span>
                </div>
                
                <a class="group block w-full bg-surface border-2 border-acid-green p-8 hover:bg-acid-green transition-colors" href="https://www.facebook.com/starthistlenorcal" target="_blank">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-headline text-3xl text-acid-green group-hover:text-background uppercase tracking-tight">Facebook</span>
                        <span class="material-symbols-outlined text-4xl text-acid-green group-hover:text-background">arrow_outward</span>
                    </div>
                    <p class="font-body text-lg text-on-surface-variant group-hover:text-background font-bold">/starthistlenorcal</p>
                </a>
                
                <a class="group block w-full bg-surface border-2 border-electric-gold p-8 hover:bg-electric-gold transition-colors" href="https://www.instagram.com/starthistle_norcal/" target="_blank">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-headline text-3xl text-electric-gold group-hover:text-background uppercase tracking-tight">Instagram</span>
                        <span class="material-symbols-outlined text-4xl text-electric-gold group-hover:text-background">arrow_outward</span>
                    </div>
                    <p class="font-body text-lg text-on-surface-variant group-hover:text-background font-bold">/starthistle_norcal</p>
                </a>
            </div>
        </div>
    </main>

    <!-- Footer Component -->
    <footer class="w-full py-12 px-4 md:px-8 flex flex-col md:flex-row justify-between items-center gap-8 bg-deep-obsidian border-t-4 border-primary-container mt-auto">
        <div class="flex flex-col gap-2 items-center md:items-start">
            <span class="font-headline text-3xl text-primary uppercase">StarThistle</span>
            <p class="font-body text-sm text-on-surface-variant">© 2025 StarThistle. Redding, CA.</p>
        </div>
        <div class="flex flex-wrap gap-6 items-center justify-center">
            <a href="https://www.facebook.com/starthistlenorcal" class="font-headline text-lg text-on-surface-variant hover:text-acid-green transition-colors uppercase">Facebook</a>
            <a href="https://www.instagram.com/starthistle_norcal/" class="font-headline text-lg text-on-surface-variant hover:text-acid-green transition-colors uppercase">Instagram</a>
            <a href="contact.html" class="font-headline text-lg text-electric-gold hover:text-acid-green transition-colors uppercase">Contact</a>
        </div>
    </footer>
</body>
</html>
